<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circe — Kate's Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 24px 20px 16px;
      border-bottom: 1px solid #2a2a40;
    }

    header h1 {
      font-size: 2rem;
      color: #c084fc;
      letter-spacing: 0.1em;
      font-weight: 300;
    }

    header p {
      font-size: 0.85rem;
      color: #6b6b8a;
      margin-top: 4px;
    }

    .main {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    /* ── Left panel: voice orb + conversation ── */
    .voice-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 24px;
      overflow: hidden;
    }

    .orb-container {
      position: relative;
      width: 160px;
      height: 160px;
      margin-bottom: 20px;
    }

    .orb {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #7c3aed, #1e1b4b);
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
      transition: all 0.4s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .orb:hover { transform: scale(1.05); }

    /* State styles */
    body.standby .orb {
      background: radial-gradient(circle at 35% 35%, #4a4a6a, #1a1a2e);
      box-shadow: 0 0 20px rgba(74, 74, 106, 0.3);
    }

    body.listening .orb {
      background: radial-gradient(circle at 35% 35%, #dc2626, #7f1d1d);
      box-shadow: 0 0 40px rgba(220, 38, 38, 0.5);
      animation: pulse 1.2s ease-in-out infinite;
    }

    body.processing .orb {
      background: radial-gradient(circle at 35% 35%, #d97706, #78350f);
      box-shadow: 0 0 40px rgba(217, 119, 6, 0.4);
      animation: spin-glow 2s linear infinite;
    }

    body.speaking .orb {
      background: radial-gradient(circle at 35% 35%, #7c3aed, #1e1b4b);
      box-shadow: 0 0 50px rgba(124, 58, 237, 0.6);
      animation: breathe 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(220, 38, 38, 0.4); }
      50% { transform: scale(1.08); box-shadow: 0 0 60px rgba(220, 38, 38, 0.7); }
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 40px rgba(124, 58, 237, 0.5); }
      50% { box-shadow: 0 0 80px rgba(124, 58, 237, 0.8); }
    }

    @keyframes spin-glow {
      0% { box-shadow: 0 0 30px rgba(217, 119, 6, 0.3), 20px 0 30px rgba(217, 119, 6, 0.3); }
      25% { box-shadow: 0 0 30px rgba(217, 119, 6, 0.3), 0 20px 30px rgba(217, 119, 6, 0.3); }
      50% { box-shadow: 0 0 30px rgba(217, 119, 6, 0.3), -20px 0 30px rgba(217, 119, 6, 0.3); }
      75% { box-shadow: 0 0 30px rgba(217, 119, 6, 0.3), 0 -20px 30px rgba(217, 119, 6, 0.3); }
      100% { box-shadow: 0 0 30px rgba(217, 119, 6, 0.3), 20px 0 30px rgba(217, 119, 6, 0.3); }
    }

    .status-text {
      font-size: 1.1rem;
      color: #9090b0;
      text-align: center;
      min-height: 28px;
      transition: all 0.3s;
    }

    body.listening .status-text { color: #fca5a5; }
    body.processing .status-text { color: #fcd34d; }
    body.speaking .status-text { color: #c084fc; }

    .interim-text {
      font-size: 0.9rem;
      color: #6060a0;
      text-align: center;
      min-height: 22px;
      font-style: italic;
      margin-top: 4px;
      max-width: 300px;
    }

    .conversation {
      flex: 1;
      overflow-y: auto;
      width: 100%;
      max-width: 580px;
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 16px;
    }

    .conversation::-webkit-scrollbar { width: 4px; }
    .conversation::-webkit-scrollbar-track { background: transparent; }
    .conversation::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 2px; }

    .message {
      padding: 12px 16px;
      border-radius: 14px;
      max-width: 90%;
      font-size: 1rem;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .message.user {
      background: #1e1e3a;
      border: 1px solid #3a3a5a;
      align-self: flex-end;
      color: #d0d0f0;
    }

    .message.circe {
      background: #1a1030;
      border: 1px solid #4c1d95;
      align-self: flex-start;
      color: #e0d0ff;
    }

    .message .speaker {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      opacity: 0.6;
    }

    .message.user .speaker { color: #7878b0; }
    .message.circe .speaker { color: #a855f7; }

    /* ── Right panel: tasks sidebar ── */
    .sidebar {
      width: 280px;
      background: #13132a;
      border-left: 1px solid #2a2a40;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid #2a2a40;
    }

    .sidebar-section h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6060a0;
      margin-bottom: 10px;
    }

    #task-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    #task-list::-webkit-scrollbar { width: 3px; }
    #task-list::-webkit-scrollbar-thumb { background: #3a3a5a; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #1e1e3a;
      font-size: 0.9rem;
      color: #c0c0e0;
      animation: fadeIn 0.3s ease;
    }

    .task-item:last-child { border-bottom: none; }

    .task-item .task-bullet {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7c3aed;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .no-tasks {
      font-size: 0.85rem;
      color: #3a3a5a;
      font-style: italic;
      padding: 8px 0;
    }

    /* Error banner */
    #error-banner {
      display: none;
      background: #7f1d1d;
      color: #fca5a5;
      padding: 10px 20px;
      text-align: center;
      font-size: 0.9rem;
    }

    /* Manual input fallback */
    .input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #2a2a40;
    }

    .input-row input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #3a3a5a;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e0e0f0;
      font-size: 0.9rem;
      outline: none;
    }

    .input-row input:focus { border-color: #7c3aed; }

    .input-row button {
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #6d28d9; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body class="standby">

<div id="error-banner">⚠️ Voice recognition requires Chrome or Edge. You can still type below.</div>

<header>
  <h1>✦ Circe</h1>
  <p>Kate's personal assistant</p>
</header>

<div class="main">

  <!-- Voice panel -->
  <div class="voice-panel">
    <div class="orb-container">
      <div class="orb" id="orb" onclick="app && app.handleOrbClick()" title="Click to activate">
        ✦
      </div>
    </div>

    <div class="status-text" id="status-text">Say "Hey Circe" to begin</div>
    <div class="interim-text" id="interim-text"></div>

    <div class="conversation" id="conversation"></div>

    <!-- Text fallback -->
    <div class="input-row">
      <input type="text" id="text-input" placeholder="Or type a message..." onkeydown="if(event.key==='Enter') app && app.sendTextInput()">
      <button onclick="app && app.sendTextInput()">Send</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>📋 Tasks</h3>
    </div>
    <div id="task-list">
      <div class="no-tasks">No tasks yet</div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
